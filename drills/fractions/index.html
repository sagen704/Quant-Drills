<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fraction Drill</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Fraction Drill</h1>
        <p class="subtitle">Type the decimal equivalent</p>
      </header>

      <div class="stats-bar">
        <div class="stat">
          <span class="stat-label">Correct</span>
          <span class="stat-value green" id="correct-count">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Wrong</span>
          <span class="stat-value red" id="wrong-count">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Streak</span>
          <span class="stat-value" id="streak">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Tolerance</span>
          <span class="stat-value" id="tol-display">±0.01</span>
        </div>
      </div>

      <div class="settings-row" id="tol-chips">
        <button class="chip active" data-tol="0.01">±0.01</button>
        <button class="chip" data-tol="0.005">±0.005</button>
        <button class="chip" data-tol="0.001">±0.001</button>
      </div>

      <div class="question-card">
        <div class="question-label">Evaluate this fraction</div>
        <div class="fraction-display" id="fraction-display">
          <span id="numerator">3</span>
          <div class="fraction-bar"></div>
          <span id="denominator">8</span>
        </div>
        <div class="tolerance-hint" id="tol-hint">
          Answer within ±0.01 accepted
        </div>
      </div>

      <div class="feedback" id="feedback"></div>

      <div class="input-row">
        <input
          type="text"
          id="answer-input"
          placeholder="0.___"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="submit-btn">Check</button>
      </div>

      <div class="next-btn-wrap">
        <button class="btn-secondary" id="skip-btn">
          Skip / New Question →
        </button>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
